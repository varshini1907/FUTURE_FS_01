<section class="page-section">

  <h1 class="page-title">
    Contact Me
  </h1>

  <div class="contact-container">

    <!-- LEFT SIDE -->

   <form class="contact-form"
onsubmit="sendMessage(event)">

  <input
  type="text"
  id="name"
  placeholder="Your Name"
  required>

  <input
  type="email"
  id="email"
  placeholder="Your Email"
  required>

  <textarea
  rows="6"
  id="message"
  placeholder="Your Message"
  required>
  </textarea>

  <button class="btn">

    Send Message

  </button>

</form>

<!-- SUCCESS MESSAGE -->

<p id="popup-message">

  Message Sent Successfully 

</p>
<script src="script.js"></script>
    <!-- RIGHT SIDE -->

target="_blank"
class="contact-btn">

  Send Email

</a>
      </div>

      <!-- PHONE -->

<div class="contact-item">
